backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

locale: "es"

collections:
  - name: "contenido"
    label: "Contenido del sitio"
    files:
      - name: "home"
        label: "Página principal"
        file: "content.json"
        fields:
          - label: "SEO"
            name: "seo"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Título de la página", name: "title", widget: "string" }
              - { label: "Descripción", name: "description", widget: "text" }
              - { label: "Palabras clave", name: "keywords", widget: "text" }
              - { label: "OG Título", name: "og_title", widget: "string" }
              - { label: "OG Descripción", name: "og_description", widget: "text" }

          - label: "Marca"
            name: "marca"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Nombre", name: "nombre", widget: "string" }
              - { label: "Subtítulo", name: "subtitulo", widget: "string" }
              - { label: "Descripción footer", name: "descripcion_footer", widget: "text" }
              - { label: "Copyright", name: "copyright", widget: "string" }

          - label: "WhatsApp"
            name: "whatsapp"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Número", name: "numero", widget: "string" }
              - { label: "Mensaje por defecto", name: "mensaje_default", widget: "string" }
              - { label: "Mensaje de alianzas", name: "mensaje_alianza", widget: "string" }

          - label: "Contacto"
            name: "contacto"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Teléfono visible", name: "telefono_display", widget: "string" }
              - { label: "Teléfono link", name: "telefono_link", widget: "string" }
              - { label: "Sitio web", name: "sitio_web", widget: "string" }
              - { label: "Sitio web URL", name: "sitio_web_url", widget: "string" }
              - { label: "Zona de cobertura", name: "zona_cobertura", widget: "string" }
              - { label: "Nota de respuesta", name: "nota_respuesta", widget: "string" }

          - label: "Menú"
            name: "nav"
            widget: "object"
            collapsed: true
            fields:
              - label: "Links"
                name: "links"
                widget: "list"
                fields:
                  - { label: "Texto", name: "texto", widget: "string" }
                  - { label: "Enlace", name: "href", widget: "string" }
              - { label: "Texto CTA", name: "cta_texto", widget: "string" }

          - label: "Hero / Portada"
            name: "hero"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Título", name: "titulo", widget: "string" }
              - { label: "Subtítulo", name: "subtitulo", widget: "text" }
              - { label: "Botón principal", name: "btn_principal", widget: "string" }
              - { label: "Botón secundario", name: "btn_secundario", widget: "string" }
              - { label: "Imagen", name: "imagen", widget: "image" }
              - { label: "Número badge", name: "badge_numero", widget: "string" }
              - { label: "Texto badge", name: "badge_texto", widget: "string" }

          - label: "Barra de confianza"
            name: "trust"
            widget: "list"
            collapsed: true
            fields:
              - { label: "Número", name: "numero", widget: "string" }
              - { label: "Descripción", name: "label", widget: "string" }

          - label: "Servicios"
            name: "servicios"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Título", name: "titulo", widget: "string" }
              - { label: "Subtítulo", name: "subtitulo", widget: "text" }
              - label: "Lista de servicios"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Ícono", name: "icono", widget: "string" }
                  - { label: "Nombre", name: "nombre", widget: "string" }
                  - { label: "Descripción", name: "descripcion", widget: "text" }
                  - { label: "Imagen", name: "imagen", widget: "image" }
                  - { label: "Alt imagen", name: "imagen_alt", widget: "string" }
                  - { label: "Texto botón", name: "btn_texto", widget: "string" }
                  - { label: "Mensaje WhatsApp", name: "wa_mensaje", widget: "string" }

          - label: "Cabinas"
            name: "cabinas"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Título", name: "titulo", widget: "string" }
              - { label: "Subtítulo", name: "subtitulo", widget: "text" }
              - label: "Lista de cabinas"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Tag", name: "tag", widget: "string" }
                  - { label: "Nombre", name: "nombre", widget: "string" }
                  - { label: "Imagen", name: "imagen", widget: "image" }
                  - label: "Características"
                    name: "caracteristicas"
                    widget: "list"
                    field: { label: "Característica", name: "item", widget: "string" }
                  - { label: "Texto botón", name: "btn_texto", widget: "string" }
                  - { label: "Mensaje WhatsApp", name: "wa_mensaje", widget: "string" }

          - label: "Paquetes"
            name: "paquetes"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Título", name: "titulo", widget: "string" }
              - { label: "Subtítulo", name: "subtitulo", widget: "text" }
              - label: "Lista de paquetes"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Evento", name: "evento", widget: "string" }
                  - { label: "Nombre", name: "nombre", widget: "string" }
                  - { label: "Destacado", name: "destacado", widget: "boolean", default: false }
                  - { label: "Badge", name: "badge", widget: "string", required: false }
                  - label: "Incluye"
                    name: "incluye"
                    widget: "list"
                    field: { label: "Incluye", name: "item", widget: "string" }
                  - { label: "Texto botón", name: "btn_texto", widget: "string" }
                  - { label: "Mensaje WhatsApp", name: "wa_mensaje", widget: "string" }

          - label: "Por qué elegir Luxor"
            name: "porque"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Título", name: "titulo", widget: "string" }
              - { label: "Imagen", name: "imagen", widget: "image" }
              - { label: "Alt imagen", name: "imagen_alt", widget: "string" }
              - { label: "Número badge", name: "badge_numero", widget: "string" }
              - { label: "Texto badge", name: "badge_texto", widget: "string" }
              - label: "Razones"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Ícono", name: "icono", widget: "string" }
                  - { label: "Título", name: "titulo", widget: "string" }
                  - { label: "Texto", name: "texto", widget: "text" }

          - label: "Galería"
            name: "galeria"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Título", name: "titulo", widget: "string" }
              - label: "Imágenes"
                name: "imagenes"
                widget: "list"
                fields:
                  - { label: "Imagen", name: "url", widget: "image" }
                  - { label: "Alt", name: "alt", widget: "string" }
                  - { label: "Columnas", name: "cols", widget: "number", default: 4 }

          - label: "Alianzas"
            name: "alianzas"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Pill", name: "pill", widget: "string" }
              - { label: "Título", name: "titulo", widget: "string" }
              - { label: "Texto", name: "texto", widget: "text" }
              - { label: "Cita", name: "cita", widget: "text" }
              - label: "Tags"
                name: "tags"
                widget: "list"
                field: { label: "Tag", name: "item", widget: "string" }
              - { label: "Botón", name: "btn_texto", widget: "string" }

          - label: "Testimonios"
            name: "testimonios"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Título", name: "titulo", widget: "string" }
              - label: "Lista de testimonios"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Texto", name: "texto", widget: "text" }
                  - { label: "Nombre", name: "nombre", widget: "string" }
                  - { label: "Evento", name: "evento", widget: "string" }
                  - { label: "Avatar", name: "avatar", widget: "image" }

          - label: "Preguntas frecuentes"
            name: "faq"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Título", name: "titulo", widget: "string" }
              - label: "Preguntas"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Pregunta", name: "pregunta", widget: "string" }
                  - { label: "Respuesta", name: "respuesta", widget: "text" }

          - label: "Contacto sección"
            name: "contacto_seccion"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Título", name: "titulo", widget: "string" }
              - { label: "Botón WhatsApp", name: "btn_whatsapp", widget: "string" }
              - label: "Tipos de evento"
                name: "tipos_evento"
                widget: "list"
                field: { label: "Tipo", name: "item", widget: "string" }
